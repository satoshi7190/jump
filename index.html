<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>演習林GIS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://api.tiles.mapbox.com/mapbox-gl-js/v2.5.0/mapbox-gl.js"></script>
    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>
    <link href="https://api.tiles.mapbox.com/mapbox-gl-js/v2.5.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="main.css">
    
</head>

<body>
  <div id="splash">
    <div id="splash_logo"><div class="fadeUp"><h1>演習林GIS</h1></div>
      <img src="https://www.forest.ac.jp/wp-content/themes/static/images/common/logo.png" alt="" class="fadeUp">
    </div>
  </div>

  <!-- ==============JQuery読み込み=============== -->
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"
    integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo=" crossorigin="anonymous"></script>
  <script src="https://coco-factory.jp/ugokuweb/wp-content/themes/ugokuweb/data/4-1-4/js/4-1-4.js"></script>

    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" type="text/css">

    <div class="controls">
        <div class="controls__item">
          <input type="radio" name="dropdown-radios" id="dropdown-radio-clear" class="u-hidden" />
          <div class="dropdown">
            <input type="radio" name="dropdown-radios" id="dropdown-radio-search" class="dropdown__radio u-hidden" />
            <label class="dropdown__label-open" for="dropdown-radio-search">ベースマップ</label>
            <label class="dropdown__label-close" for="dropdown-radio-clear">ベースマップ</label>
            <div class="dropdown__contents">
              <div class="dropdown__contents-inner">

                <nav id="menu2"></nav>
              </div>
            </div>
          </div>
        </div>
        <div class="controls__item">
          <div class="dropdown">
            <input type="radio" name="dropdown-radios" id="dropdown-radio-crop" class="dropdown__radio u-hidden" />
            <label class="dropdown__label-open" for="dropdown-radio-crop">レイヤー</label>
            <label class="dropdown__label-close" for="dropdown-radio-clear">レイヤー</label>
            <div class="dropdown__contents">
              <div class="dropdown__contents-inner">
                <nav id="menu"></nav>
                  
                
              </div>
            </div>
          </div>
        </div>
        <div class="controls__item">
          <div class="dropdown">
            <input type="radio" name="dropdown-radios" id="dropdown-radio-layers" class="dropdown__radio u-hidden" />
            <label class="dropdown__label-open" for="dropdown-radio-layers">場所検索</label>
            <label class="dropdown__label-close" for="dropdown-radio-clear">場所検索</label>
            <div class="dropdown__contents">
              <div class="dropdown__contents-inner">
                <div id="geocoder" class="geocoder"></div>
                  
      
                  
                
              </div>
            </div>
          </div>
        </div>
        <div class="controls__item">
          <div class="dropdown">
            <input type="radio" name="dropdown-radios" id="dropdown-radio-zoom" class="dropdown__radio u-hidden" />
            <label class="dropdown__label-open" for="dropdown-radio-zoom">ツール</label>
            <label class="dropdown__label-close" for="dropdown-radio-clear">ツール</label>
            <div class="dropdown__contents">
              <div class="dropdown__contents-inner">
                
                <div class="map-overlay top">
                  <div class="map-overlay-inner">
                      演習林-林班 
                      <input id="slider" type="range" min="0" max="100" step="0" value="100">
                  
                  </div>
              </div>

                  
                
              </div>
            </div>
          </div>
        </div>
        <div class="controls__item">
          <div class="dropdown">
            <input type="radio" name="dropdown-radios" id="dropdown-radio-basemaps" class="dropdown__radio u-hidden" />
            <label class="dropdown__label-open" for="dropdown-radio-basemaps">その他</label>
            <label class="dropdown__label-close" for="dropdown-radio-clear">その他</label>
            <div class="dropdown__contents">
              <div class="dropdown__contents-inner">
                
                <li class="ui-list__item"><a>準備中です</a></li>
                  
              </div>
            </div>
          </div>
        </div>
      </div>
      
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>
<link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" type="text/css">

      <div id="map"></div>
   
</div>
</body>
<script type="text/javascript" src="main.js"></script>
</body>
</html>
